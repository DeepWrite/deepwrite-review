name: Build And Editorial Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Export approved Markdown only
        run: python pipelines/export_markdown.py

      - name: Run editorial and publication tests
        run: pytest

      - name: Build Jekyll site
        run: bundle exec jekyll build --source site --destination docs

