name: Monthly Topic Map

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  topic-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Create monthly topic map
        run: python pipelines/topic_map.py

      - name: Open or update review pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: editorial/monthly-topic-map
          commit-message: "Create monthly topic map"
          title: "Monthly Topic Map: Chief Editor review"
          body: |
            Automated monthly topic map for Chief Editor review.

            This workflow does not publish content.
          labels: topic-map

