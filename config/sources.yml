source_hierarchy:
  tier_1:
    label: "Primary and authoritative evidence"
    uses:
      - "Facts, law, statistics, datasets, institutional records, peer-reviewed findings"
    examples:
      - official statistics
      - court decisions
      - legislation
      - government reports
      - international organizations
      - peer-reviewed academic literature
      - established datasets
  tier_2:
    label: "High-quality institutional and journalistic evidence"
    uses:
      - "Context, debate, policy interpretation, independently reported developments"
    examples:
      - university research centers
      - major polling organizations
      - transparent think tank reports
      - major newspapers and magazines with strong editorial standards
  tier_3:
    label: "Expert commentary and situated interpretation"
    uses:
      - "Argument mapping, expert interpretation, discourse evidence"
    examples:
      - expert commentary
      - interviews
      - newsletters
      - opinion essays
  tier_4:
    label: "Discourse-only material"
    uses:
      - "Evidence of discourse, attention, rhetoric, or mobilization only"
    examples:
      - social media
      - partisan blogs
      - viral posts
      - unsourced claims
    prohibition: "Do not use Tier 4 sources as evidence of factual truth; use them only as evidence of discourse."
