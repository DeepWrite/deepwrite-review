korea_raw_sources:
  official_statistics:
    - name: "Ministry of Data and Statistics / Statistics Korea"
      url: "https://kostat.go.kr/"
      tier: 1
      use: "Korean population, labor, household, price, social, and demographic data."
    - name: "Korean Statistical Information Service"
      url: "https://kosis.kr/"
      tier: 1
      use: "Raw statistical tables and time series."
  economy_finance:
    - name: "Bank of Korea"
      url: "https://www.bok.or.kr/eng/main/main.do"
      tier: 1
      use: "Monetary policy, national accounts, balance of payments, financial stability, economic outlook."
    - name: "Ministry of Economy and Finance"
      url: "https://english.moef.go.kr/main.do"
      tier: 1
      use: "Fiscal policy, economic bulletins, budget documents, policy announcements."
  law_institutions:
    - name: "Constitutional Court of Korea"
      url: "https://english.ccourt.go.kr/"
      tier: 1
      use: "Constitutional decisions, summaries, and institutional materials."
    - name: "National Assembly of the Republic of Korea"
      url: "https://www.assembly.go.kr/"
      tier: 1
      use: "Bills, proceedings, committee records, legislative status."
    - name: "Korea Law Translation Center"
      url: "https://elaw.klri.re.kr/"
      tier: 1
      use: "Translated statutes and legal materials; verify against Korean authoritative text where needed."
  elections:
    - name: "National Election Commission"
      url: "https://www.nec.go.kr/"
      tier: 1
      use: "Election calendars, turnout, candidate, and official result data."
korean_commentary_rule:
  allowed_use: "Evidence of discourse, agenda-setting, media attention, controversy, or elite framing."
  prohibited_use: "Raw evidence for factual, statistical, legal, institutional, or causal claims."
